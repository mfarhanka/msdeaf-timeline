<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malaysian Deaf Sports History | MSDeaf Timeline</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-content">
      <div class="logo-area">
        <div class="logo-circle">MSDeaf</div>
      </div>
      <h1 class="site-title">Malaysian Deaf Sports History</h1>
      <p class="site-subtitle">A journey through the milestones of deaf sports in Malaysia</p>
      <p class="powered-by">Powered by <strong>Malaysian Deaf Sports Association (MSDeaf)</strong></p>
    </div>
    <div class="header-scroll-hint">
      <span>Scroll to explore</span>
      <div class="scroll-arrow">&#8595;</div>
    </div>
  </header>

  <!-- Timeline -->
  <main>
    <section class="timeline-section">
      <div class="timeline-year-nav" id="timeline-year-nav" aria-label="Jump to timeline year">
        <!-- Year jump buttons will be injected by script.js -->
      </div>
      <div class="timeline-container" id="timeline-container">
        <!-- Timeline items will be injected by script.js -->
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p>&copy; <span id="footer-year"></span> Malaysian Deaf Sports Association (MSDeaf). All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
